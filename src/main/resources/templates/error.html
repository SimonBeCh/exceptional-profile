<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<div class="container">
    <h1>Something went wrong</h1>
    <div class="error-box">
        <p>
            <strong>Status:</strong>
            <span th:text="${status}">500</span>
        </p>
        <p>
            <strong>Error:</strong>
            <span th:text="${error}">Internal Server Error</span>
        </p>
        <p>
            <strong>Message:</strong>
            <span th:text="${message}">Unexpected error</span>
        </p>
    </div>
    <p>
        The application encountered an error.
    </p>
    <div class="actions">
        <a th:href="@{/exprofiles}" class="button">Back to profiles</a>
    </div>

</div>
</body>
</html>
