<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${formTitle}">Profile Form</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <h1 th:text="${formTitle}">Profile Form</h1>

    <div class="error-box" th:if="${errorMessage}">
        <p th:text="${errorMessage}"></p>
    </div>

    <form th:action="${formAction}" th:object="${profile}" method="post">
        <div class="field">
            <label for="name">Name</label>
            <input id="name" type="text"  th:field="*{name}" maxlength="100">
        </div>

        <div class="field">
            <label for="email">Email</label>
            <input id="email" type="text"  th:field="*{email}" maxlength="100">
        </div>

        <div class="actions">
            <button type="submit" th:text="${submitLabel}">Save</button>
            <a th:href="@{/exprofiles}" class="button">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
